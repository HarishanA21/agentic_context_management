name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  structure:
    name: Structure & secret checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files exist
        run: |
          set -e
          for f in api.py requirements.txt README.md ui/app/page.tsx ui/package.json; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::Required file is missing"
              exit 1
            fi
          done

      - name: No env files committed
        run: |
          if git ls-files | grep -E '(^|/)\.env(\.|$)' | grep -v '\.env\.example$' | grep -v '\.env\.local\.example$'; then
            echo "::error::Environment files must not be committed"
            exit 1
          fi

      - name: No node_modules / venv committed
        run: |
          if git ls-files | grep -E '(^|/)(node_modules|\.venv)/'; then
            echo "::error::node_modules or .venv directories must not be committed"
            exit 1
          fi

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Syntax check
        run: python -m compileall -q api.py Tools 2>/dev/null || python -m compileall -q api.py

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build
        run: npm run build
